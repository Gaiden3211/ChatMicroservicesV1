  # === MICROSERVICES ===
  mongodb:
    image: mongo:latest
    container_name: discord-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8443:8443"
    environment:
      - GUILD_SERVICE_URL=http://guild-service:8083
      # Використовуємо змінну з .env
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET}
#      - JAVA_TOOL_OPTIONS="-Xmx180m"
      - SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_MAX_CONNECTIONS=500
      - SPRING_CLOUD_GATEWAY_HTTPCLIENT_POOL_ACQUIRE_TIMEOUT=20000
    deploy:
      resources:
        limits:
          memory: 700M
    depends_on:
      - auth-service
      - user-service
      - guild-service
      - chat-service
    volumes:
      - ./logs:/logs
      - ./certs:/certs
    networks:
      - app-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-silent-bird-ai4tfxry-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_DB_NEON_USER_DB}

      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_ENABLE_LAZY_LOAD_NO_TRANS=true

      - GRPC_SERVER_PORT=9090
      - GRPC_SERVER_SECURITY_ENABLED=false
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=20
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=5
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=50000
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000

      - AWS_S3_BUCKET=${AWS_S3_BUCKET}

#      - JAVA_TOOL_OPTIONS="-Xmx180m"

      - REDIS_HOST=redis-16752.c274.us-east-1-3.ec2.cloud.redislabs.com
      - REDIS_PORT=16752
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

      # Додай це в environment кожного сервісу:
#      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    deploy:
      resources:
        limits:
          memory: 700M
    networks:
      - app-network
#    depends_on:
#      kafka:
#        condition: service_healthy
#      user-db:
#        condition: service_healthy
    restart: on-failure

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-still-smoke-aio1pgkq-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_DB_NEON_AUTH_DB}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SERVICES_USER_URL=http://user-service:8080
      - GRPC_CLIENT_USER_SERVICE_ADDRESS=static://user-service:9090
      - GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE=plaintext
      # Використовуємо змінну з .env
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET}
      - APPLICATION_SECURITY_JWT_ACCESS_TOKEN_EXPIRATION=900000
      - APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION=604800000
#      - JAVA_TOOL_OPTIONS="-Xmx180m"
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL=${BASE_URL}
      - AUTH_REDIRECT_URI=${AUTH_REDIRECT_URI}
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=20
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=5
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=50000
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
      # Додай це в environment кожного сервісу:
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    deploy:
      resources:
        limits:
          memory: 700M
    networks:
      - app-network
    depends_on:
#      auth-db:
#        condition: service_healthy
      user-service:
        condition: service_started
    restart: on-failure

  guild-service:
    build:
      context: .
      dockerfile: guild-service/Dockerfile
    container_name: guild-service
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-frosty-waterfall-ai5mkg0b-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_DB_NEON_GUILD_DB}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - GRPC_SERVER_PORT=9093
      - GRPC_SERVER_SECURITY_ENABLED=false
      - GRPC_CLIENT_USER_SERVICE_ADDRESS=static://user-service:9090
      - GRPC_CLIENT_USER_SERVICE_NEGOTIATION_TYPE=plaintext
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=20
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=5
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=50000
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000
#      - JAVA_TOOL_OPTIONS="-Xmx180m"
      # Додай це в environment кожного сервісу:
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
    deploy:
      resources:
        limits:
          memory: 700M
    networks:
      - app-network
    depends_on:
#      guild-db:
#        condition: service_healthy
      user-service:
        condition: service_started
    restart: on-failure

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: chat-service
    ports:
      - "8085:8085"
    environment:
      - GUILD_SERVICE_URL=http://guild-service:8083
      - USER_SERVICE_URL=http://user-service:8080
#      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-orange-moon-aia3zgw0-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
#      - SPRING_DATASOURCE_USERNAME=neondb_owner
#      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_DB_NEON_CHAT_DB}
      - SPRING_DATA_MONGODB_URI=mongodb://admin:password@discord-mongodb:27017/chat_db?authSource=admin

      - REDIS_HOST=redis-16752.c274.us-east-1-3.ec2.cloud.redislabs.com
      - REDIS_PORT=16752
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - GUILD_SERVICE_GRPC_HOST=guild-service
      - GUILD_SERVICE_GRPC_PORT=9093
      # Використовуємо змінну з .env
      - FRONTEND_URL=${BASE_URL}
      - APPLICATION_SECURITY_JWT_SECRET_KEY=${JWT_SECRET}

      # Додай це в environment кожного сервісу:
      - SPRING_AUTOCONFIGURE_EXCLUDE=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE=20
      - SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE=5
      - SPRING_DATASOURCE_HIKARI_MAX_LIFETIME=50000
      - SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT=30000

      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
#      - JAVA_TOOL_OPTIONS="-Xmx180m"
    deploy:
      resources:
        limits:
          memory: 700M

    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_started
#      chat-db:
#        condition: service_healthy
      user-service:
        condition: service_started
      guild-service:
        condition: service_started
    restart: on-failure

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Обмеження JVM для Zookeeper
      KAFKA_HEAP_OPTS: "-Xmx128M -Xms128M"
      ZOOKEEPER_LOG4J_ROOT_LOGLEVEL: WARN
      ZOOKEEPER_TOOLS_LOG4J_LOGLEVEL: WARN
    ports:
      - "2181:2181"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - app-network
    healthcheck:
      test: echo srvr | nc localhost 2181 || exit 1
      interval: 10s
      retries: 5
      start_period: 10s
    restart: on-failure

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 30000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 30000
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_TOOLS_LOG4J_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: "kafka.controller=WARN,kafka.producer.async.DefaultEventHandler=WARN,state.change.logger=WARN"
      # КРИТИЧНО ВАЖЛИВО ДЛЯ Free Tier: Обмежуємо RAM
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
    deploy:
      resources:
        limits:
          memory: 450M
    networks:
      - app-network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 10s
      retries: 10
      start_period: 20s
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - JAVA_TOOL_OPTIONS="-Xmx180m"
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ep-lively-river-ait3xndk-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require
      - SPRING_DATASOURCE_USERNAME=neondb_owner
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_DB_NEON_NOTIFICATION_DB}
    deploy:
      resources:
        limits:
          memory: 300M
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

volumes:
  mongo_data:
#  user-db-data:
#  auth-db-data:
#  guild-db-data:
#  chat_db_data:

networks:
  app-network:
    driver: bridge