spring:
  datasource:
    hikari:
      # Повинно бути менше, ніж таймаут на Neon (зазвичай 30-60 сек)
      max-lifetime: 60000
      # Час очікування вільного з'єднання
      connection-timeout: 20000
      # Перевірка з'єднання перед використанням
      validation-timeout: 3000
  kafka:
    bootstrap-servers: kafka:29092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer


  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 хвилин (в мілісекундах)
      cache-null-values: false # Не кешувати "пустоту", якщо юзера не знайдено

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

