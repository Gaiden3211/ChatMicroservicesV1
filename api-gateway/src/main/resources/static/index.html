<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Discord Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><style>
        :root {
            --bg-dark: #202225;
            --bg-secondary: #2f3136;
            --bg-tertiary: #36393f;
            --bg-chat: #36393f;
            --channel-hover: #393c43;
            --active: #42464D;
            --text-normal: #dcddde;
            --text-muted: #72767d;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --server-rail: #202225;
        }
        body { margin: 0; padding: 0; font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-normal); height: 100vh; overflow: hidden; display: flex; }

        /* --- Auth Styles --- */
        #login-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://discord.com/assets/f9e7949365287f717887.png'); background-size: cover; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .auth-container { background: var(--bg-secondary); padding: 32px; border-radius: 5px; box-shadow: 0 2px 10px 0 rgba(0,0,0,.2); width: 480px; text-align: center; }
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; color: #b9bbbe; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid #202225; color: white; border-radius: 3px; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .google-btn { background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 15px; }
        .toggle-link { color: var(--accent); cursor: pointer; font-size: 14px; margin-top: 20px; display: block; }
        .hidden { display: none !important; }
        /* --- Layout --- */
        #app-container { display: none; width: 100%; height: 100%; display: flex; }

        /* 1. Server Rail (Left) */
        .guild-nav { width: 72px; background-color: var(--server-rail); display: flex; flex-direction: column; align-items: center; padding-top: 12px; overflow-y: auto; }
        .guild-icon {
            width: 48px; height: 48px; background-color: var(--bg-tertiary); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px;
            cursor: pointer; transition: all 0.2s; color: var(--text-normal); font-weight: bold;
            position: relative; background-size: cover; background-position: center;
        }
        .guild-icon:hover, .guild-icon.active { background-color: var(--accent); border-radius: 16px; color: white; }
        .guild-separator { width: 32px; height: 2px; background-color: var(--bg-secondary); margin: 8px 0; }
        .home-icon { background-color: #36393f; }

        /* 2. Sidebar (Middle) */
        .sidebar { width: 240px; background-color: var(--bg-secondary); display: flex; flex-direction: column; }
        .sidebar-header { padding: 0 16px; height: 48px; border-bottom: 1px solid #202225; font-weight: bold; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 0 rgba(4,4,5,0.2); }
        .list-content { flex: 1; overflow-y: auto; padding: 10px 8px; }

        .nav-item { display: flex; align-items: center; padding: 8px; border-radius: 4px; cursor: pointer; color: var(--text-muted); margin-bottom: 2px; }
        .nav-item:hover { background-color: var(--channel-hover); color: var(--text-normal); }
        .nav-item.active { background-color: var(--active); color: white; }
        .nav-item-avatar { width: 32px; height: 32px; background-color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 10px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        /* 3. Chat Area (Right) */
        .chat-area { flex: 1; background-color: var(--bg-chat); display: flex; flex-direction: column; min-width: 0; }
        .chat-header { padding: 0 16px; height: 48px; border-bottom: 1px solid #26272d; font-weight: bold; color: white; display: flex; align-items: center; box-shadow: 0 1px 0 rgba(4,4,5,0.2); }
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; gap: 15px; margin-bottom: 5px; }
        .message:hover { background-color: rgba(4,4,5,0.07); }

        .input-area { padding: 20px; }
        .input-wrapper { background-color: #40444b; border-radius: 8px; padding: 0 16px; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; background: transparent; border: none; padding: 12px 0; color: white; font-size: 15px; outline: none; }

        .user-footer { padding: 10px; background: #292b2f; display: flex; align-items: center; }
        ::-webkit-scrollbar { width: 8px; background-color: #2e3338; }
        ::-webkit-scrollbar-thumb { background-color: #202225; border-radius: 4px; }
        /* Кнопка завантаження */
        .upload-btn {
            padding: 10px;
            color: #b9bbbe;
            cursor: pointer;
            transition: color 0.2s;
        }
        .upload-btn:hover { color: #dcddde; }

        /* Відображення фото у повідомленнях */
        .message-text {
            color: #dcddde;
            line-height: 1.375rem;
            word-wrap: break-word;
            user-select: text;
        }

        .image-attachment {
            margin-top: 8px;
            position: relative;
            display: inline-block;
        }

        .message-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 4px;
            object-fit: contain;
            cursor: zoom-in;
        }

        /* Зона попереднього перегляду файлів */
        .attachment-preview {
            display: flex;
            gap: 10px;
            padding: 10px 16px;
            background-color: #2f3136;
            border-bottom: 1px solid #202225;
            overflow-x: auto;
            display: none; /* Ховаємо, коли пуста */
        }

        .preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            background-color: #202225;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .preview-file-icon {
            font-size: 24px;
            color: #b9bbbe;
        }

        .remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ed4245;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #2f3136;
        }

        /* Змінюємо input-area, щоб вмістити прев'ю */
        .input-area {
            padding: 0;
            background-color: #40444b;
            margin: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }

        .input-wrapper {
            background-color: transparent;
            padding: 0 16px;
        }

        /* --- НОВІ СТИЛІ --- */

        /* Кнопки в інпуті */
        .attach-btn {
            color: #b9bbbe;
            cursor: pointer;
            padding: 10px;
            background: none;
            border: none;
            font-size: 16px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .attach-btn:hover { color: #dcddde; }

        /* Анімація запису */
        .recording { color: #ed4245 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Аудіо плеєр */
        audio {
            height: 40px;
            width: 300px;
            border-radius: 20px;
            outline: none;
        }
        /* Фікс для Chrome, щоб плеєр був світлим */
        audio::-webkit-media-controls-panel {
            background-color: #f1f3f4;
        }

        /* Прев'ю файлів */
        .attachment-preview {
            display: flex;
            gap: 10px;
            padding: 10px 16px;
            background-color: #2f3136;
            border-bottom: 1px solid #202225;
            border-radius: 8px 8px 0 0;
            overflow-x: auto;
            display: none; /* Сховано за замовчуванням */
        }

        /* Змінюємо input-area, щоб все влізло */
        .input-area {
            padding: 0;
            background-color: #40444b;
            margin: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
        }
        .input-wrapper {
            background-color: transparent;
            padding: 0 16px;
            display: flex; /* Важливо для вирівнювання кнопок */
            align-items: center;
        }
        .input-wrapper input { flex: 1; } /* Інпут займає всю вільну ширину */

        /* --- PROFILE MODAL STYLES --- */
        .profile-header {
            background-color: #202225;
            height: 100px;
            position: relative;
            border-radius: 8px 8px 0 0;
        }
        .profile-avatar-upload {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 6px solid #36393f;
            position: absolute;
            bottom: -50px;
            left: 20px;
            background-color: #2f3136;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-avatar-upload:hover::after {
            content: "CHANGE";
            color: white;
            font-size: 10px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-body {
            padding: 60px 20px 20px 20px;
        }
        .settings-input {
            width: 100%;
            background-color: #202225;
            border: 1px solid #202225;
            padding: 10px;
            border-radius: 4px;
            color: white;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .settings-label {
            color: #b9bbbe;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- AI ASSISTANT STYLES --- */
        .ai-menu {
            position: absolute;
            bottom: 70px; /* З'являється над інпутом */
            right: 20px;
            background: #2f3136;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 250px;
            z-index: 100;
            overflow: hidden;
            border: 1px solid #202225;
        }
        .ai-menu-header {
            padding: 10px;
            background: #202225;
            color: #b9bbbe;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .ai-menu-item {
            width: 100%;
            text-align: left;
            padding: 10px 15px;
            background: none;
            border: none;
            color: #dcddde;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ai-menu-item:hover { background: #393c43; color: white; }
        .ai-prompt-container { padding: 10px; border-top: 1px solid #202225; }
        .ai-prompt-input {
            width: 100%;
            background: #202225;
            border: none;
            color: white;
            padding: 8px;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }

        /* --- STATUS INDICATORS --- */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-right: 10px;
        }
        .nav-item-avatar { margin-right: 0 !important; /* Перевизначаємо старий відступ */ }

        .status-dot {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
            background-color: #747f8d; /* Сірий (Офлайн) за замовчуванням */
            z-index: 2;
        }
        .status-online { background-color: #3ba55c; }
        .status-offline { background-color: #747f8d; }


        /* --- UNREAD BADGES --- */
        .unread-badge {
            background-color: #ed4245; /* Фірмовий червоний Discord */
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 12px;
            padding: 2px 6px;
            margin-left: auto; /* Притискає бейдж до правого краю */
            box-shadow: 0 0 0 2px var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 8px;
        }

        /* Біла смужка зліва від іконки гільдії (як у Discord) */
        .guild-unread::before {
            content: '';
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            transition: height 0.2s, border-radius 0.2s;
        }
        .guild-unread:hover::before {
            height: 20px;
            border-radius: 4px;
        }

        /* --- MESSAGE ACTIONS (EDIT / DELETE) --- */
        .message { position: relative; padding-right: 50px; }
        .msg-actions {
            display: none;
            position: absolute;
            right: 20px;
            top: -10px;
            background: var(--bg-tertiary);
            padding: 2px 5px;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            border: 1px solid var(--bg-dark);
            z-index: 10;
        }
        .message:hover .msg-actions { display: flex; gap: 5px; }

        .msg-action-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 3px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .msg-action-btn:hover { background: var(--bg-secondary); color: var(--text-normal); }
        .msg-action-btn.delete-btn:hover { color: #ed4245; }

        .edited-tag { font-size: 11px; color: var(--text-muted); margin-left: 5px; font-style: italic; }


        /* --- REACTIONS STYLES --- */
        .reactions-bar { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .reaction-pill {
            background: var(--bg-secondary); border: 1px solid transparent;
            border-radius: 6px; padding: 2px 6px; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; gap: 4px; color: var(--text-muted);
            user-select: none; transition: 0.1s;
        }
        .reaction-pill:hover { border-color: #5865f2; }
        .reaction-pill.reacted { background: rgba(88, 101, 242, 0.15); border-color: #5865f2; color: #5865f2; }

        .emoji-picker-container { position: relative; display: inline-block; }
        .emoji-picker-menu {
            display: none; position: absolute; right: 0; top: 25px; background: var(--bg-tertiary);
            border-radius: 4px; padding: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 100;
            white-space: nowrap; border: 1px solid var(--bg-dark);
        }
        .emoji-picker-container:hover .emoji-picker-menu { display: flex; gap: 5px; }
        .emoji-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; transition: transform 0.1s; }
        .emoji-btn:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="auth-container" id="login-form">
        <h2 style="color:white">Welcome Back!</h2>
        <div class="input-group"><label>Username</label><input type="text" id="login-username"></div>
        <div class="input-group"><label>Password</label><input type="password" id="login-password"></div>
        <button class="auth-btn" onclick="performLogin()">Log In</button>
        <button class="auth-btn google-btn" onclick="performGoogleLogin()">Sign in with Google</button>
        <span class="toggle-link" onclick="toggleForms()">Need an account? Register</span>
    </div>
    <div class="auth-container hidden" id="register-form">
        <h2 style="color:white">Create Account</h2>
        <div class="input-group"><label>Username</label><input type="text" id="reg-username"></div>
        <div class="input-group"><label>Email</label><input type="email" id="reg-email"></div>
        <div class="input-group"><label>Password</label><input type="password" id="reg-password"></div>
        <button class="auth-btn" onclick="performRegister()">Continue</button>
        <span class="toggle-link" onclick="toggleForms()">Back to Login</span>
    </div>
</div>

<div id="app-container" class="hidden">
    <div class="guild-nav" id="guildList">
        <div class="guild-icon home-icon active" id="home-button" onclick="switchToHome()" title="Home">
            <i class="fab fa-discord" style="font-size: 28px;"></i>
        </div>
        <div class="guild-separator"></div>
        <div class="guild-icon" onclick="createNewGuild()" style="color: #3ba55c; background-color: var(--bg-secondary);" title="Add Server">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header" id="sidebarHeader">
            <span>Direct Messages</span>
            <div style="display:flex; gap:10px;">
                <button onclick="openInvitesModal()" style="background:none; border:none; color:white; cursor:pointer;" title="Invites">
                    <i class="fas fa-envelope"></i>
                </button>
                <button onclick="startNewChat()" style="background:none; border:none; color:white; cursor:pointer;">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </div>
        <div class="list-content" id="navList"></div>

        <div class="user-footer">
            <div class="nav-item-avatar" id="my-avatar" onclick="openProfileModal()" style="cursor: pointer;">ME</div>
            <div style="margin-left: 10px; cursor: pointer;" onclick="openProfileModal()">
                <div style="color: white; font-weight: bold; font-size: 14px;" id="my-username">...</div>
                <div style="color: #b9bbbe; font-size: 12px;">Online</div>
            </div>
            <button onclick="logout()" style="margin-left: auto; background: none; border: none; color: #ed4245; cursor: pointer;"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <i id="chatHeaderIcon" class="fas fa-at" style="margin-right: 10px; color: #72767d;"></i>
            <span id="chatTitle">Select a conversation</span>
            <button id="callBtn" onclick="startCall()" style="margin-left:auto; background:none; border:none; color:#dcddde; cursor:pointer; font-size:18px; display:none;">
                <i class="fas fa-video"></i>
            </button>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area" style="position: relative;">
            <div id="attachmentPreview" class="attachment-preview"></div>
            <div id="typingIndicator" style="height: 18px; font-size: 13px; color: #b9bbbe; padding: 0 20px; font-style: italic; margin-bottom: 5px;"></div>

            <div id="aiMenu" class="ai-menu hidden">
                <div class="ai-menu-header">AI Assistant 🪄</div>

                <button class="ai-menu-item" onclick="processAiText('FIX_ERRORS')">
                    <i class="fas fa-spell-check"></i> Fix Grammar
                </button>

                <div class="ai-prompt-container" style="display: flex; gap: 5px;">
                    <input type="text" id="aiStyleInput" class="ai-prompt-input" placeholder="Style (e.g. Pirate, Formal)" style="flex: 1;">
                    <button class="attach-btn" style="padding: 5px;" onclick="processAiText('CHANGE_STYLE')" title="Apply Style">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="ai-prompt-container" style="display: flex; gap: 5px;">
                    <input type="text" id="aiLangInput" class="ai-prompt-input" placeholder="Language (e.g. French)" style="flex: 1;">
                    <button class="attach-btn" style="padding: 5px;" onclick="processAiText('TRANSLATE')" title="Translate">
                        <i class="fas fa-language"></i>
                    </button>
                </div>

                <div class="ai-prompt-container">
                    <input type="text" id="aiPrompt" class="ai-prompt-input" placeholder="Ask AI to generate..." onkeypress="if(event.key === 'Enter') processAiText('GENERATE_NEW')">
                </div>
            </div>

            <div class="input-wrapper">
                <input type="file" id="fileInput" class="hidden" multiple onchange="handleFileSelect(this)">

                <button class="attach-btn" onclick="document.getElementById('fileInput').click()" title="Upload File">
                    <i class="fas fa-plus-circle"></i>
                </button>

                <button class="attach-btn" onclick="toggleAiMenu()" title="AI Assistant">
                    <i class="fas fa-magic" style="color: #faa61a;"></i>
                </button>

                <input type="text" id="messageInput" placeholder="Message..." disabled onkeypress="handleEnter(event)" oninput="handleTyping()">

                <button id="recordBtn" class="attach-btn" onclick="toggleRecording()" title="Click to Record">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
        </div>
    </div>
</div>


<div id="callModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center;">

    <div style="position:relative; width:800px; height:500px; background:#1e1e1e; border-radius:8px; overflow:hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);">

        <video id="remoteVideo" autoplay playsinline style="width:100%; height:100%; object-fit:contain; background:#000;"></video>

        <video id="localVideo" autoplay playsinline muted style="position:absolute; bottom:20px; right:20px; width:160px; height:120px; background:#333; border-radius:8px; object-fit:cover; border: 2px solid #202225; z-index: 10;"></video>

        <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:15px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; z-index: 10;">

            <button id="btnToggleMic" onclick="toggleMic()" style="background:#36393f; color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; font-size: 20px; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-microphone"></i>
            </button>

            <button id="btnToggleCam" onclick="toggleCam()" style="background:#36393f; color:white; border:none; width:50px; height:50px; border-radius:50%; cursor:pointer; font-size: 20px; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-video"></i>
            </button>

    // Утиліта для Web Push (конвертує Base64 VAPID ключ у Uint8Array)
    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
            outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
    }

            console.warn("Push-сповіщення не підтримуються цим браузером.");
            return;

        try {

            console.log('✅ Service Worker зареєстровано успішно:', registration.scope);

            // 2. Питаємо дозвіл у користувача

            if (permission !== 'granted') {
                console.log("❌ Користувач заборонив сповіщення.");
                return;
            }

            // 3. Створюємо підписку (звертаємося до серверів Google/Mozilla)

                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)

            }

            console.log("Отримана підписка:", subscription);

            // 4. Відправляємо підписку на наш notification-service
            await sendSubscriptionToServer(subscription);

    // --- UTILS: Надійне Base64 кодування ---
    function arrayBufferToBase64(buffer) {
        let binary = '';
        const bytes = new Uint8Array(buffer);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        return window.btoa(binary);
    }

    function base64ToArrayBuffer(base64) {
        const binary_string = window.atob(base64);
        const len = binary_string.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binary_string.charCodeAt(i);
        }
        return bytes.buffer;
    }



    // Глобальна змінна для мого публічного ключа (додай це на початку скрипта разом з іншими let)
    let myPublicKey = null;

    const CryptoManager = {
        // ... (функції generateKeyPair, exportKey, importKey залишаються без змін) ...
        async generateKeyPair() {
            return await window.crypto.subtle.generateKey(
                { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                true, ["encrypt", "decrypt"]
            );
        },
        async exportKey(key, type = "spki") {
            const exported = await window.crypto.subtle.exportKey(type, key);
            return arrayBufferToBase64(exported);
        },
        async importKey(base64, type = "spki", usage = ["encrypt"]) {
            const binaryBuffer = base64ToArrayBuffer(base64);
            return await window.crypto.subtle.importKey(type, binaryBuffer, { name: "RSA-OAEP", hash: "SHA-256" }, true, usage);
        },

        // 🔥 ОНОВЛЕНЕ ШИФРУВАННЯ
        // Тепер приймає myPublicKeyPem (твій ключ)
        async encryptMessage(text, recipientPublicKeyPem, myPublicKeyPem) {
            try {
                // 1. Генеруємо одноразовий AES ключ
                const aesKey = await window.crypto.subtle.generateKey(
                    { name: "AES-GCM", length: 256 },
                    true, ["encrypt"]
                );

                // 2. Шифруємо текст (AES)
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encodedText = new TextEncoder().encode(text);
                const encryptedContent = await window.crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv },
                    aesKey,
                    encodedText
                );

                // 3. Експортуємо AES ключ у байти
                const rawAesKey = await window.crypto.subtle.exportKey("raw", aesKey);

                // 4. Шифруємо AES ключ для ОТРИМУВАЧА
                const recipientKey = await this.importKey(recipientPublicKeyPem, "spki", ["encrypt"]);
                const keyForRecipient = await window.crypto.subtle.encrypt(
                    { name: "RSA-OAEP" },
                    recipientKey,
                    rawAesKey
                );

                // 5. Шифруємо AES ключ для СЕБЕ (щоб потім прочитати історію)
                const myKey = await this.importKey(myPublicKeyPem, "spki", ["encrypt"]);
                const keyForMe = await window.crypto.subtle.encrypt(
                    { name: "RSA-OAEP" },
                    myKey,
                    rawAesKey
                );

                // 6. Формуємо новий JSON
                return JSON.stringify({
                    iv: arrayBufferToBase64(iv),
                    content: arrayBufferToBase64(encryptedContent),
                    keys: {
                        recipient: arrayBufferToBase64(keyForRecipient),
                        sender: arrayBufferToBase64(keyForMe)
                    }
                });
            } catch (e) {
                console.error("Encryption failed:", e);
                return null;
            }
        },

        // 🔥 ОНОВЛЕНЕ ДЕШИФРУВАННЯ
        // Тепер вміє вибирати правильний ключ
        async decryptMessage(encryptedJson, myPrivateKey, isMyMessage) {
            try {
                const data = JSON.parse(encryptedJson);

                // Перевірка на старий формат (якщо раптом є старі повідомлення)
                if (data.key && !data.keys) {
                    // Стара логіка для зворотної сумісності
                    data.keys = { recipient: data.key };
                }

                if (!data.iv || !data.keys || !data.content) return encryptedJson;

                // 1. Вибираємо, який зашифрований AES ключ брати
                let targetEncryptedKeyBase64;

                if (isMyMessage) {
                    // Якщо це я відправив - беру ключ, зашифрований для мене (sender)
                    targetEncryptedKeyBase64 = data.keys.sender;
                } else {
                    // Якщо мені прислали - беру ключ, зашифрований для отримувача (recipient)
                    targetEncryptedKeyBase64 = data.keys.recipient;
                }

                if (!targetEncryptedKeyBase64) return "🔒 Cannot decrypt (Key missing)";

                // 2. Дешифруємо AES ключ
                const encryptedAesKey = base64ToArrayBuffer(targetEncryptedKeyBase64);
                const rawAesKey = await window.crypto.subtle.decrypt(
                    { name: "RSA-OAEP" },
                    myPrivateKey,
                    encryptedAesKey
                );

                // 3. Відновлюємо AES ключ
                const aesKey = await window.crypto.subtle.importKey(
                    "raw",
                    rawAesKey,
                    "AES-GCM",
                    true, ["decrypt"]
                );

                // 4. Дешифруємо контент
                const iv = base64ToArrayBuffer(data.iv);
                const encryptedContent = base64ToArrayBuffer(data.content);
                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv },
                    aesKey,
                    encryptedContent
                );

                return new TextDecoder().decode(decryptedBuffer);
            } catch (e) {
                console.warn("Decryption error:", e);
                return "🔒 Error decrypting";
            }
        }
    };

                        const privPem = await CryptoManager.exportKey(keyPair.privateKey, "pkcs8");

                        const txWrite = db.transaction("keys", "readwrite");
                        const storeWrite = txWrite.objectStore("keys");

                        storeWrite.put({
                            id: storageKeyId, // Зберігаємо під ID юзера
                            publicKey: pubPem,
                            privateKey: privPem
                        });

                        await new Promise((resTx, rejTx) => {
                            txWrite.oncomplete = () => resTx();
                            txWrite.onerror = () => rejTx(txWrite.error);
                        });

                        myPublicKey = pubPem;

                        await uploadPublicKey(pubPem);
                    }

                    console.log("✅ Crypto Init Complete.");
                    resolve();

                } catch (err) {
                    console.error("Crypto Init Error:", err);
                    reject(err);
                }
            };

            request.onerror = (e) => reject(e);
        });
    }

    const StorageManager = {

        async updateMessage(messageId, newContent) {
            const db = await this.getDB();
            return new Promise((resolve) => {
                const tx = db.transaction("messages", "readwrite");
                const store = tx.objectStore("messages");

                // Шукаємо як строку, а якщо немає - як число
                let req = store.get(String(messageId));

                req.onsuccess = () => {
                    let msg = req.result;
                    if (!msg) {
                        // Фолбек для старих повідомлень, які збереглися як числа
                        req = store.get(Number(messageId));
                        req.onsuccess = () => {
                            if (req.result) updateAndSave(req.result, store, resolve, newContent);
                            else resolve(false);
                        }
                    } else {
                        updateAndSave(msg, store, resolve, newContent);
                    }
                };

                function updateAndSave(m, st, res, content) {
                    m.content = content;
                    m.isEdited = true;
                    st.put(m);
                    res(true);
                }
            });
        },

        async deleteMessage(messageId) {
            const db = await this.getDB();
            return new Promise((resolve) => {
                const tx = db.transaction("messages", "readwrite");
                const store = tx.objectStore("messages");

                // Видаляємо обидва варіанти (строку і число) для надійності
                store.delete(String(messageId));
                store.delete(Number(messageId));

                tx.oncomplete = () => resolve(true);
            });
        },

        getDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open("SecureChatDB", 3
                );
                req.onsuccess = e => resolve(e.target.result);
                req.onerror = e => reject(e);
            });
        },

        // Зберегти одне повідомлення
        async saveMessage(chatId, msg) {
            const db = await this.getDB();
            const tx = db.transaction("messages", "readwrite");
            const store = tx.objectStore("messages");

            // Ми додаємо поле chatId до об'єкта повідомлення, щоб знати, до якого чату воно належить
            // Важливо: msg.id має бути унікальним ID з сервера (або згенеруй timestamp якщо нема)
            const msgToSave = {
                ...msg,
                chatId: chatId,
                id: msg.id || `${chatId}-${msg.timestamp}-${Math.random()}` // Фолбек ID
            };

            store.put(msgToSave);
        },

        // Завантажити історію чату
        async loadMessages(chatId) {
            const db = await this.getDB();
            return new Promise((resolve) => {
                const tx = db.transaction("messages", "readonly");
                const store = tx.objectStore("messages");
                const index = store.index("chatId");

                const request = index.getAll(chatId); // Отримати всі повідомлення для цього chatId

                request.onsuccess = () => {
                    // Сортуємо за часом (на всяк випадок)
                    const msgs = request.result.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
                    resolve(msgs);
                };
            });
        }
    };

    // --- ПОЧАТОК ЗАПИСУ ---
    async function startRecording() {
        try {
            // 1. Питаємо доступ
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            currentStream = stream; // Зберігаємо, щоб потім вимкнути

            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            // 2. Збираємо дані
            mediaRecorder.ondataavailable = e => {
                if(e.data.size > 0) audioChunks.push(e.data);
            };

            // 3. Коли зупинили - відправляємо
            mediaRecorder.onstop = async () => {
                // Якщо шматочків немає (надто короткий клік), ігноруємо
                if (audioChunks.length === 0) return;

                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([audioBlob], "voice_msg.webm", { type: "audio/webm" });

                // Додаємо в чергу
                pendingFiles = [file];

                // Відправляємо
                await sendMessage();

                // 🔥 ВАЖЛИВО: Зупиняємо мікрофон повністю (щоб зникла червона точка в браузері)
                if (currentStream) {
                    currentStream.getTracks().forEach(track => track.stop());
                    currentStream = null;
                }
            };

            // 4. Старт
            mediaRecorder.start();
            isRecording = true;

            // Візуал
            const btn = document.getElementById('recordBtn');
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fas fa-stop"></i>'; // Змінюємо іконку на "Стоп"

        } catch(e) {
            console.error(e);
            alert("Mic access denied or error: " + e.message);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        // Якщо пустий текст і немає файлів - виходимо
        if (!text && pendingFiles.length === 0) return;

        if (pendingFiles.length > 0) {

                const formData = new FormData();
                formData.append('file', file);
                try {
                    const res = await fetch(`${GATEWAY_URL}/api/v1/chat/media/upload/files`, {
                        method: 'POST', headers: { 'Authorization': currentToken },
                        body: formData
                    });
                    if (res.ok) {

                        return {
                            url: data.url,
                            thumbnailUrl: data.thumbnailUrl,
                            fileName: data.fileName,
                            type: data.type
                        };
                    }
                } catch (e) { console.error(e); }
                return null;
            });
            uploadedAttachments = (await Promise.all(uploadPromises)).filter(r => r !== null);
        }

        // 2. Визначаємо тип повідомлення
        let msgType = uploadedAttachments.length > 0 ? uploadedAttachments[0].type : 'TEXT';

        // --- E2EE ШИФРУВАННЯ ---
        let finalContent = text;

        // Шифруємо тільки приватні повідомлення (DM) і якщо є текст
        if (viewMode === 'dm' && currentDmUserId && text) {
            const recipientData = await resolveUserData(currentDmUserId, true);

            if (recipientData.publicKey) {
                console.log("🔒 Encrypting message for both...");
                const encrypted = await CryptoManager.encryptMessage(text, recipientData.publicKey, myPublicKey);
                if (encrypted) {
                    finalContent = encrypted; // Це JSON-рядок з шифром
                }

                console.warn("⚠️ Recipient has no Public Key!");
            }

        // ---------------------------

        // 🔥 ГЕНЕРУЄМО ЄДИНИЙ ID (і робимо його строкою), який буде спільним для обох юзерів у DM
        const tempId = Date.now().toString() + Math.floor(Math.random() * 1000);

            // А. Відправляємо на сервер (шифр)

            // Б. ЗБЕРІГАЄМО В БАЗУ (IndexedDB) -> ЗАШИФРОВАНЕ

                ...wsMsg,

    // Універсальна обробка дій (бронебійна версія)
    async function processMessageActionLocally(actionDto) {
        let key = "";
        if (actionDto.recipientId) {
            const partnerId = (actionDto.sender === String(myUserId)) ? actionDto.recipientId : actionDto.sender;
            key = `dm-${partnerId}`;
        } else {
            key = `guild-${actionDto.guildId}-chan-${actionDto.channelId}`;
        }

        // Хелпер для застосування змін
        const applyModification = (msg) => {
            if (actionDto.action === "DELETE") return null;
            if (actionDto.action === "EDIT") {
                msg.content = actionDto.content;
                msg.isEdited = true;
            }
            if (actionDto.action === "REACT") {
                // Якщо бекенд прислав готовий об'єкт (Гільдії)
                if (actionDto.reactions && typeof actionDto.reactions === 'object') {
                    msg.reactions = actionDto.reactions;
                } else {
                    // Локальний підрахунок (для DMs)
                    let rMap = {};
                    if (typeof msg.reactions === 'string') {
                        try { rMap = JSON.parse(msg.reactions || "{}"); } catch(e){}
                    } else if (msg.reactions && typeof msg.reactions === 'object') {
                        rMap = msg.reactions;
                    }

                    const emoji = actionDto.content;
                    const senderId = String(actionDto.sender);
                    let users = rMap[emoji] || [];

                    if (users.includes(senderId)) {
                        users = users.filter(u => u !== senderId);
                        if (users.length === 0) delete rMap[emoji];
                        else rMap[emoji] = users;
                    } else {
                        users.push(senderId);
                        rMap[emoji] = users;
                    }
                    msg.reactions = rMap;
                }
            }
            return msg;
        };

        // 🔥 1. ОНОВЛЮЄМО RAM ТА ЕКРАН (Робимо це першим, щоб UI не зависав!)
        let history = chatHistory[key];
        if (history) {
            if (actionDto.action === "DELETE") {
                chatHistory[key] = history.filter(m => String(m.id) !== String(actionDto.id));
            } else {
                const msgInRam = history.find(m => String(m.id) === String(actionDto.id));
                if (msgInRam) applyModification(msgInRam);
            }

            // Перемальовуємо UI
            if ((viewMode === 'dm' && key === `dm-${currentDmUserId}`) ||
                (viewMode === 'guild' && key === `guild-${currentGuild?.id}-chan-${currentChannel?.id}`)) {
                renderMessages(key);
            }
        }

        // 🔥 2. ОНОВЛЮЄМО БАЗУ (У фоні, з перевіркою на NaN)
        try {
            const db = await StorageManager.getDB();
            const tx = db.transaction("messages", "readwrite");
            const store = tx.objectStore("messages");

            const reqStr = store.get(String(actionDto.id));
            reqStr.onsuccess = () => {
                if (reqStr.result) {
                    processAndSave(reqStr.result);
                } else {
                    // Тільки якщо ID - це число (старі повідомлення), робимо фолбек
                    const numId = Number(actionDto.id);
                    if (!isNaN(numId)) {
                        const reqNum = store.get(numId);
                        reqNum.onsuccess = () => {
                            if (reqNum.result) processAndSave(reqNum.result);
                        };
                    }
                }

                function processAndSave(m) {
                    const updated = applyModification(m);
                    if (updated === null) store.delete(m.id);
                    else store.put(updated);
                }
            };
        } catch (e) {
            console.warn("IndexedDB update skipped/failed:", e);
        }
    }
    // --- НОВА ФУНКЦІЯ ВІДОБРАЖЕННЯ ---
    async function renderMessages(key) {

        for (const m of msgs) {

            const isMe = senderIdStr === myIdStr || m.sender === "Me";

            let displayName = "Loading...";
            let avatarUrl = null;

            if (isMe) {
                // Беремо дані з футера

                const myFooterAvatar = document.getElementById('my-avatar');
                if (myFooterAvatar && myFooterAvatar.style.backgroundImage && myFooterAvatar.style.backgroundImage !== 'none') {
                    // backgroundImage виглядає як url("...url..."), прибираємо зайве
                    avatarUrl = myFooterAvatar.style.backgroundImage.slice(5, -2);
                }
            } else {
                // Беремо дані з кешу/сервера
                const userData = await resolveUserData(m.sender);
                displayName = userData ? userData.username : `User ${m.sender}`;
                avatarUrl = userData ? userData.avatarUrl : null;
            }

            // --- E2EE ДЕШИФРУВАННЯ (тільки для DMs) ---
            let contentToShow = m.content;

            if (viewMode === 'dm' && contentToShow && contentToShow.startsWith('{')) {
                // Перевіряємо, чи є в нас приватний ключ для розшифровки
                if (typeof myPrivateKey !== 'undefined' && myPrivateKey) {
                    try {
                        const decrypted = await CryptoManager.decryptMessage(m.content, myPrivateKey, isMe);
                        if (!decrypted.startsWith("🔒")) {
                            contentToShow = decrypted;
                        } else {
                            console.warn("Decryption failed for msg", m.id);
                            contentToShow = `<span style="color:#ed4245; font-style:italic; font-size: 12px;"><i class="fas fa-lock"></i> Помилка дешифрування (старий ключ)</span>`;
                        }
                    } catch (e) {
                        console.error("Critical decryption crash:", e);
                        contentToShow = `<span style="color:#ed4245;">⛔ Error</span>`;
                    }
                } else {
                    contentToShow = "🔒 Waiting for keys...";
                }
            }

            // МАЛЮЄМО АВАТАР
            let avatarHtml = "";
            if (avatarUrl) {
                avatarHtml = `<div class="nav-item-avatar" style="min-width:40px; height:40px; border-radius:50%; background-image: url('${avatarUrl}'); background-size: cover; background-position: center; margin-right:15px;"></div>`;
            } else {
                const bgColor = isMe ? '#faa61a' : '#5865f2';
                avatarHtml = `<div class="nav-item-avatar" style="min-width:40px; height:40px; border-radius:50%; background:${bgColor}; display:flex; align-items:center; justify-content:center; margin-right:15px; color:white; font-weight:bold;">${displayName.substring(0,2).toUpperCase()}</div>`;
            }

            // МАЛЮЄМО ТІЛО ПОВІДОМЛЕННЯ
            let htmlBody = "";

            // Захист від XSS та збереження форматування
            if (contentToShow.includes("<span")) {
                // Якщо це HTML з помилкою дешифрування - вставляємо як є
                htmlBody += `<span style="color:#dcddde;">${contentToShow}</span>`;
            } else {
                // Екрануємо звичайний текст
                const safeText = contentToShow.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                htmlBody += `<span style="color:#dcddde; white-space:pre-wrap;">${safeText}</span>`;
            }

            // Додаємо позначку (edited)
            if (m.isEdited) {
                htmlBody += `<span class="edited-tag">(edited)</span>`;
            }

            // Вкладення (Фото, Аудіо)
            if (m.attachments && m.attachments.length > 0) {
                htmlBody += `<div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:5px;">`;
                m.attachments.forEach(att => {
                    if (att.type === 'IMAGE') {
                        // Твій друг зробив шикарну галерею, використовуємо thumbnailUrl
                        htmlBody += `<a href="${att.url}" target="_blank"><img src="${att.thumbnailUrl || att.url}" style="max-width:300px; max-height:300px; border-radius:8px; object-fit:cover;"></a>`;
                    } else if (att.type === 'VOICE') {
                        htmlBody += `<audio controls src="${att.url}" style="height:35px;"></audio>`;
                    } else {
                        htmlBody += `<a href="${att.url}" target="_blank" style="color:#00aff4;">File</a>`;
                    }
                });
                htmlBody += `</div>`;
            }

            // 🔥 МАЛЮЄМО РЕАКЦІЇ (Нова логіка)
            let reactionsHtml = "";
            let rMap = {};
            // Обробляємо різні формати збереження (JSON рядок від сервера vs Об'єкт з БД)
            if (typeof m.reactions === 'string') {
                try { rMap = JSON.parse(m.reactions || "{}"); } catch(e){ rMap = {}; }
            } else if (typeof m.reactions === 'object' && m.reactions !== null) {
                rMap = m.reactions;
            }

            if (Object.keys(rMap).length > 0) {
                reactionsHtml += `<div class="reactions-bar">`;
                for (const [emoji, users] of Object.entries(rMap)) {
                    const hasMe = users.includes(myIdStr);
                    const pillClass = hasMe ? "reaction-pill reacted" : "reaction-pill";
                    // Клік по плашці toggle'ить емодзі
                    reactionsHtml += `<div class="${pillClass}" onclick="sendReactionAction('${m.id}', '${emoji}')">
                        ${emoji} <span style="font-weight:bold; margin-left:2px;">${users.length}</span>
                    </div>`;
                }
                reactionsHtml += `</div>`;
            }

            // ЧАС ПОВІДОМЛЕННЯ
            let msgTime = m.timestamp;
            if (typeof msgTime === 'string' && !msgTime.endsWith('Z')) msgTime += 'Z';
            const displayTimeString = new Date(msgTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            // 🔥 ДОДАЄМО КНОПКИ ДІЙ (Зі смайликом!)
            let actionsHtml = `<div class="msg-actions">`;

            // 1. Emoji Picker (Доступний для ВСІХ повідомлень)
            actionsHtml += `
                <div class="emoji-picker-container">
                    <button class="msg-action-btn" title="Add Reaction"><i class="fas fa-smile"></i></button>
                    <div class="emoji-picker-menu">
                        <button class="emoji-btn" onclick="sendReactionAction('${m.id}', '👍')">👍</button>
                        <button class="emoji-btn" onclick="sendReactionAction('${m.id}', '❤️')">❤️</button>
                        <button class="emoji-btn" onclick="sendReactionAction('${m.id}', '😂')">😂</button>
                        <button class="emoji-btn" onclick="sendReactionAction('${m.id}', '😢')">😢</button>
                    </div>
                </div>`;

            // 2. Редагування/видалення тільки для власних повідомлень
            if (isMe) {
                // Екрануємо одинарні дужки для JS
                const escapedForJs = contentToShow.replace(/'/g, "\\'");
                actionsHtml += `
                    <button class="msg-action-btn" title="Edit" onclick="initEditMessage('${m.id}', '${escapedForJs}')"><i class="fas fa-pen"></i></button>
                    <button class="msg-action-btn delete-btn" title="Delete" onclick="sendDeleteAction('${m.id}')"><i class="fas fa-trash"></i></button>
                `;
            }
            actionsHtml += `</div>`;

            // ФІНАЛЬНИЙ HTML ЗБІРКА РЯДКА
            div.innerHTML = `
            ${avatarHtml}
            <div style="flex: 1; min-width: 0;">
                <div style="color:white; font-weight:bold; font-size:15px; margin-bottom:5px;">
                    ${displayName} <span style="font-size:12px; color:#72767d; margin-left:8px;">${displayTimeString}</span>
                </div>
                <div>${htmlBody}</div>
                ${reactionsHtml} </div>
            ${actionsHtml}`;

            container.appendChild(div);
        }

        container.scrollTop = container.scrollHeight;
    }

    // --- AUTH ---
    async function performLogin() {
        const u = document.getElementById('login-username').value;
        const p = document.getElementById('login-password').value;
        try {
            const res = await fetch(`${GATEWAY_URL}/api/v1/auth/grpc/login`, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ username: u, password: p })
            });
            const data = await res.json();
            if(res.ok) completeLogin(data.access_token || data.token);
            else alert(data.message);
        } catch(e) { alert("Error: " + e.message); }
    }

    function performGoogleLogin() { window.location.href = "/oauth2/authorization/google"; }

    // Додай 'async' перед function
    async function completeLogin(token) {
        currentToken = token.startsWith("Bearer ") ? token : "Bearer " + token;
        localStorage.setItem('jwt_token', token);
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-container').classList.remove('hidden');

        // Парсинг токена...
        try {
            const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            const payload = JSON.parse(jsonPayload);
            if(payload.userId) myUserId = payload.userId;
            else if(payload.id) myUserId = payload.id;
        } catch(e) {}

        console.log("🚀 Starting Crypto Init for User:", myUserId);

        // 🔥 ЧЕКАЄМО завершення ініціалізації ключів
        try {
            await initCrypto();
        } catch (e) {
            console.error("Failed to init crypto, chat may not work:", e);
        }

        // Тільки тепер підключаємося, коли myPrivateKey точно є
        connectWebSocket();
        fetchMyGuilds();
        switchToHome();
        loadMyProfile();
        initWebPush();
    }


    async function performRegister() {
        const username = document.getElementById('reg-username').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        if(!username || !email || !password) return alert("Fill all fields");

        try {
            const response = await fetch(`${GATEWAY_URL}/api/v1/auth/grpc/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });

            const data = await response.json();

            if (response.ok) {
                const token = data.access_token || data.token;
                if (token) {
                    completeLogin(token);
                } else {
                    alert("Account created. Please log in.");
                    toggleForms();
                }
            } else {
                alert("Registration failed: " + (data.message || "Unknown error"));
            }
        } catch (e) {
            console.error(e);
            alert("Network error.");
        }
    }

    // Змінна для збереження підписок на гільдії, щоб не підписуватися двічі
    let activeGuildStatusSubs = {};

    function connectWebSocket() {
        const socket = new WebSocket(WS_URL);
        stompClient = Stomp.over(socket);
        stompClient.debug = null;

        // 🔥 ДОДАНО: Передаємо userId в заголовках!
        stompClient.connect({
            'Authorization': currentToken,
            'userId': String(myUserId)
        }, function(frame) {
            console.log("WS Connected");

            // 1. Слухаємо звичайні повідомлення
            stompClient.subscribe('/user/queue/messages', function(msg) {
                handleIncomingMessage(JSON.parse(msg.body), 'dm');
            });

            // 2. Слухаємо дзвінки
            stompClient.subscribe('/user/queue/call', function(msg) {
                console.log("📞 [INCOMING SIGNAL RECEIVED]:", msg.body);
                if (typeof handleCallSignal === "function") {
                    handleCallSignal(JSON.parse(msg.body));
                }
            });

            // 🔥 ДОДАНО: Слухаємо оновлення статусів друзів (DM)
            stompClient.subscribe('/user/queue/status', function(msg) {
                const data = JSON.parse(msg.body);
                updateStatusIcon(data.userId, data.status);
            });

        }, function(err) {
            console.error("WS Error", err);
            setTimeout(connectWebSocket, 5000);
        });
    }

    function subscribeToChannel(guildId, channelId) {
        if(activeChannelSubscription) {
            activeChannelSubscription.unsubscribe();
        }
        // Topic: /topic/guild.{guildId}.channel.{channelId}
        const topic = `/topic/guild/${guildId}/channel/${channelId}`;
        console.log("Subscribing to " + topic);

        activeChannelSubscription = stompClient.subscribe(topic, function(msg) {
            handleIncomingMessage(JSON.parse(msg.body), 'guild');
        });
    }

    function updateStatusIcon(userId, status) {

        if (dot) {
            if (status === 'ONLINE') {
                dot.classList.remove('status-offline');
                dot.classList.add('status-online');

                dot.classList.remove('status-online');
                dot.classList.add('status-offline');
            }

    async function fetchInitialStatuses(userIds) {

        try {

                method: 'POST',
                headers: {
                    'Authorization': currentToken,
                    'Content-Type': 'application/json'
                },

            });
            if (res.ok) {
                const statuses = await res.json();

    // --- MESSAGING ---



    function handleIncomingMessage(msg, type) {
        console.log("📨 [WS INCOMING]", msg);

        if (msg.action === "TYPING") {
            const incomingSender = String(msg.sender);
            if (incomingSender === String(myUserId)) return; // Ігноруємо своє власне друкування


            // Перевіряємо, чи ми зараз в тому чаті, де хтось друкує
            let isForCurrentChat = false;
            if (type === 'dm' && viewMode === 'dm' && currentDmUserId == incomingSender) isForCurrentChat = true;
            if (type === 'guild' && viewMode === 'guild' && currentGuild?.id == msg.guildId && currentChannel?.id == msg.channelId) isForCurrentChat = true;

            if (isForCurrentChat) {
                showTypingIndicator(incomingSender);
            }
            return; // 🔥 Виходимо, щоб ця подія НЕ збереглася в історію!
        }
        // Якщо це дія над існуючим повідомленням (редагування/видалення)
        if (msg.action) {
            processMessageActionLocally(msg);
            return;
        }

        const incomingSender = String(msg.sender);
        const myId = String(myUserId);

        // 🔥 ОНОВЛЕНА ЛОГІКА ВІДЛУННЯ (Echo Cancellation)
        if (type === 'dm' && (incomingSender === myId || incomingSender === "Me")) {
            return; // У DMs ігноруємо свої повідомлення (ми вже їх намалювали самі під час відправки)
        }
        // У Гільдіях ми ПРОПУСКАЄМО свої повідомлення далі,
        // щоб вони намалювалися з реальним ID від бази даних!

        let key = "";
        let isActiveChat = false;

        if (type === 'dm') {
            const partnerId = incomingSender;
            key = `dm-${partnerId}`;

            // Перевіряємо, чи ми зараз дивимось на цей конкретний чат
            isActiveChat = (viewMode === 'dm' && currentDmUserId == partnerId);

            // Якщо чат не відкритий прямо зараз - вішаємо бейдж
            if (!isActiveChat) {
                addUnreadBadge(`contact-${partnerId}`);
            }

        } else if (type === 'guild') {
            key = `guild-${msg.guildId}-chan-${msg.channelId}`;

            isActiveChat = (viewMode === 'guild' && currentGuild?.id == msg.guildId && currentChannel?.id == msg.channelId);

            // Якщо це не наше повідомлення і ми не в цьому чаті - вішаємо бейдж
            if (incomingSender !== myId && !isActiveChat) {
                addUnreadBadge(`chan-${msg.channelId}`);
                if (currentGuild?.id != msg.guildId) {
                    addUnreadBadge(`guild-icon-${msg.guildId}`, true);
                }
            }
        }

        const fixedTimestamp = new Date();
        const msgObj = {
            id: msg.id ? String(msg.id) : Date.now().toString(), // 🔥 ЗАВЖДИ СТРІНГА
            sender: msg.sender,
            content: msg.content,
            attachments: msg.attachments,
            reactions: msg.reactions || {},
            timestamp: fixedTimestamp
        };

        pushMessage(key, msgObj);

        // Зберігаємо в IndexedDB тільки DMs (бо гільдійні лежать на бекенді,
        // але якщо ти кешуєш і гільдійні локально, залиш цей виклик для обох)
        if (type === 'dm') {
            StorageManager.saveMessage(key, msgObj);
        }

        // Оновлюємо екран тільки якщо чат активний
        if (isActiveChat) {
            renderMessages(key);
        }
    }

    function pushMessage(key, msg) {
        if(!chatHistory[key]) chatHistory[key] = [];
        chatHistory[key].push(msg);
    }

    async function resolveUserData(userId, forceFreshKey = false) {
        // Якщо ключ є в пам'яті і ми не вимагаємо свіжий - беремо з пам'яті
        if (!forceFreshKey && usersCache[userId]?.publicKey) {
            return usersCache[userId];
        }

        console.log(`🌍 Fetching ABSOLUTELY FRESH data for user ${userId}`);

        try {
            // 🔥 ДОДАНО: ?nocache=${Date.now()}
            // Це гарантує, що браузер не віддасть старий ключ із кешу!
            const r = await fetch(`${GATEWAY_URL}/api/v1/user/${userId}?nocache=${Date.now()}`, {
                headers: { 'Authorization': currentToken }
            });

            if (!r.ok) return usersCache[userId] || {};

            const u = await r.json();

            usersCache[userId] = {
                username: u.username,
                avatarUrl: u.avatarUrl,
                publicKey: u.publicKey
            };

            return usersCache[userId];
        } catch (e) {
            console.error("Error fetching user data:", e);
            return {};
        }
    }

    async function setupPeerConnection() {
        peerConnection = new RTCPeerConnection(rtcConfig);

        peerConnection.onicecandidate = event => {
            if (event.candidate) {
                const targetId = isCaller ? currentDmUserId : window.incomingCallerId;
                if(targetId) {
                    sendSignal({ type: 'CANDIDATE', candidate: JSON.stringify(event.candidate), recipientId: targetId });
                }
            }
        };

        peerConnection.ontrack = event => {
            const remoteVid = document.getElementById('remoteVideo');
            if (remoteVid.srcObject !== event.streams[0]) {
                remoteVid.srcObject = event.streams[0];
                console.log("✅ Received remote stream!");
            }
        };

        localStream = new MediaStream();

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            addStreamToConnection(stream);
        } catch (err1) {
            console.warn("Failed to get Video+Audio, trying Audio only...", err1);
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
                addStreamToConnection(stream);
                isCamOff = true;
                updateControlButtons();
            } catch (err2) {
                console.warn("No media devices found. Joining as listener.", err2);
                isMicMuted = true;
                isCamOff = true;
                updateControlButtons();
            }
        }
    }

    function addStreamToConnection(stream) {
        localStream = stream;
        document.getElementById('localVideo').srcObject = stream;
        stream.getTracks().forEach(track => {
            peerConnection.addTrack(track, stream);
        });
        isMicMuted = false;
        isCamOff = false;
        updateControlButtons();
    }

    async function handleCallSignal(signal) {
        if (signal.type === 'OFFER') {
            window.incomingCallerId = signal.senderId;
            window.pendingOffer = signal.sdp;
            pendingCandidates = []; // Очищаємо чергу при новому вхідному
            document.getElementById('callerName').innerText = "User " + signal.senderId;
            document.getElementById('incomingCallModal').style.display = 'flex';
        }
        else if (signal.type === 'ANSWER') {
            if(!peerConnection) return;
            const desc = new RTCSessionDescription(JSON.parse(signal.sdp));
            await peerConnection.setRemoteDescription(desc);
            document.getElementById('callStatus').innerText = "Connected";

            // 🔥 Обробляємо пакети, які прийшли поки ми підключались
            processPendingCandidates();
        }
        else if (signal.type === 'CANDIDATE') {
            const candidate = new RTCIceCandidate(JSON.parse(signal.candidate));

            // 🔥 ФІКС: Більше ніяких "if(!peerConnection) return;"!
            // Зберігаємо кандидатів завжди, навіть якщо друг ще не підняв трубку
            if (peerConnection && peerConnection.remoteDescription && peerConnection.remoteDescription.type) {
                await peerConnection.addIceCandidate(candidate);
            } else {
                console.log("⏳ Queueing ICE candidate (Waiting for Accept or RemoteDesc)");
                pendingCandidates.push(candidate);
            }
        }
        else if (signal.type === 'HANGUP') {
            closeCallUI();
        }
    }

    async function acceptCall() {
        document.getElementById('incomingCallModal').style.display = 'none';
        isCaller = false;

        openCallUI("Connecting...");
        await setupPeerConnection();

        if (!peerConnection) return;

        try {
            const desc = new RTCSessionDescription(JSON.parse(window.pendingOffer));
            await peerConnection.setRemoteDescription(desc); // З'єднання встановлено!

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            sendSignal({ type: 'ANSWER', sdp: JSON.stringify(answer), recipientId: window.incomingCallerId });

            // 🔥 Тепер безпечно додаємо маршрути, які висіли в черзі
            processPendingCandidates();

        } catch (e) {
            console.error(e);
            alert("Failed to accept call");
            closeCallUI();
        }
    }

    // 🔥 ФУНКЦІЯ ДЛЯ ОБРОБКИ ЧЕРГИ
    async function processPendingCandidates() {
        while (pendingCandidates.length > 0) {
            const candidate = pendingCandidates.shift();
            try {
                await peerConnection.addIceCandidate(candidate);
                console.log("✅ Processed queued ICE candidate");
            } catch (e) {
                console.error("Failed to add queued candidate", e);
            }
        }
    }

                if (!uploadRes.ok) {
                    const errorText = await uploadRes.text();
                    throw new Error(`Failed to upload avatar: ${errorText}`);
                }
            }

            // --- 2. Update Text Data (PATCH) ---
            const patchRes = await fetch(`${GATEWAY_URL}/api/v1/user/${myUserId}`, {
                method: 'PATCH',
                headers: {
                    'Authorization': currentToken,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    id: myUserId,
                    username: newUsername,
                    email: newEmail
                })
            });

            if (!patchRes.ok) {
                const errorText = await patchRes.text();
                throw new Error(errorText || "Failed to update profile");
            }

            // --- 3. Handle Success ---
            const updatedUser = await patchRes.json();

            // Update Footer UI
            document.getElementById('my-username').innerText = updatedUser.username;

            // Update Avatar in Footer
            const myAvatarDiv = document.getElementById('my-avatar');
            if (updatedUser.avatarUrl) {
                myAvatarDiv.innerText = "";
                myAvatarDiv.style.backgroundImage = `url(${updatedUser.avatarUrl})`;
                myAvatarDiv.style.backgroundSize = "cover";
            } else {
                myAvatarDiv.style.backgroundImage = "none";
                myAvatarDiv.innerText = updatedUser.username.substring(0, 2).toUpperCase();
            }

            // 🔥 CRITICAL FIX: Reset the file input and global variable
            avatarFileToUpload = null;
            document.getElementById('avatarUploadInput').value = "";

            alert("Profile saved!");
            document.getElementById('profileModal').style.display = 'none';

        } catch (e) {
            console.error(e);
            alert("Error saving profile: " + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Save Changes";
        }
    }


    async function loadMyProfile() {
        if (!myUserId) return;
        try {
            // Запитуємо свої дані з сервера
            const res = await fetch(`${GATEWAY_URL}/api/v1/user/${myUserId}`, {
                headers: { 'Authorization': currentToken }
            });

            if (res.ok) {
                const user = await res.json();

                // 1. Оновлюємо ім'я в футері
                document.getElementById('my-username').innerText = user.username;

                // 2. Оновлюємо аватарку в футері
                const myAvatarDiv = document.getElementById('my-avatar');
                if (user.avatarUrl) {
                    myAvatarDiv.innerText = "";
                    myAvatarDiv.style.backgroundImage = `url(${user.avatarUrl})`;
                    myAvatarDiv.style.backgroundSize = "cover";
                    myAvatarDiv.style.backgroundColor = "transparent";
                } else {
                    myAvatarDiv.style.backgroundImage = "none";
                    myAvatarDiv.innerText = user.username.substring(0, 2).toUpperCase();
                    myAvatarDiv.style.backgroundColor = "#5865f2";
                }
            }
        } catch (e) {
            console.error("Failed to load my profile", e);
        }
    }

</script>
