syntax = "proto3";

package gaiden.da.grpc.guild;

option java_multiple_files = true;
option java_package = "gaiden.da.grpc.guild";

service GuildService {
  rpc CheckGuildAccess (AccessRequest) returns (AccessResponse);
}

message AccessRequest {
  string user_id = 1;
  string guild_id = 2;
}

message AccessResponse {
  bool has_access = 1; 
}